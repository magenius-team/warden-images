name: Docker Image Magepack
on:
#  schedule:
#    - cron: "0 0 1 * *" # At 00:00 on day-of-month 1
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths:
      - version
      - images/magepack/**

permissions:
  contents: write
  packages: write

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: echo "matrix=${{ vars.MAGEPACK_MATRIX }}" >> $GITHUB_OUTPUT
      - run: echo "Matrix:\n";echo '${{ steps.set-matrix.outputs.matrix }}'

  magepack:
    needs: build-matrix
    name: Magepack
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Login to Github Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ !env.ACT }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: ${{ !env.ACT }}

      - uses: docker/build-push-action@v7
        with:
          context: images/magepack
          platforms: linux/amd64,linux/arm64
          build-args: MAGEPACK_VERSION=${{ matrix.version }}
          push: ${{ github.ref == 'refs/heads/main' && !env.ACT }}
          tags: ghcr.io/${{ github.repository_owner }}/magepack:${{ matrix.version }}

  update-readme:
    needs: [ magepack ]
    uses: ./.github/workflows/update-readme.yml
    with:
      package_name: Magepack
    secrets: inherit
